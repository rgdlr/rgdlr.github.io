      @import url("https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@500;700;900&display=swap");

      :root {
        --color-yellow: #fafa24;
        --color-blue: #0606e0;
        --color-dark: #121212;
        --color-white: #ffffff;
      }

      body {
        background-color: var(--color-blue);
        color: var(--color-dark);
        font-family: "Inter", sans-serif;
        overflow: hidden; /* App-like feel */
        height: 100dvh; /* Dynamic viewport height for mobile */
        display: flex;
        flex-direction: column;
      }

      /* --- Typography --- */
      .font-display {
        font-family: "Archivo Black", sans-serif;
      }

      /* --- Components --- */
      .brutal-card {
        background-color: var(--color-white);
        border: 4px solid var(--color-dark);
        box-shadow: 8px 8px 0px var(--color-dark);
        transition: transform 0.2s;
      }

      .brutal-btn {
        background-color: var(--color-yellow);
        color: var(--color-blue);
        border: 4px solid var(--color-dark);
        box-shadow: 6px 6px 0px var(--color-dark);
        font-family: "Archivo Black", sans-serif;
        text-transform: uppercase;
        transition: all 0.1s;
      }

      .brutal-btn:active:not(:disabled) {
        transform: translate(4px, 4px);
        box-shadow: 2px 2px 0px var(--color-dark);
      }

      .brutal-btn:disabled {
        background-color: #cccccc;
        color: #666666;
        cursor: not-allowed;
        transform: translate(2px, 2px);
        box-shadow: 4px 4px 0px var(--color-dark);
      }

      /* Category tags */
      .tag {
        border: 2px solid var(--color-dark);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .bg-pattern {
        background-image: radial-gradient(var(--color-yellow) 15%, transparent 16%);
        background-size: 20px 20px;
        opacity: 0.1;
      }

      /* Slide menu animation */
      .slide-enter {
        transform: translateX(100%);
      }
      .slide-enter-active {
        transform: translateX(0);
        transition: transform 0.3s ease-out;
      }
      .slide-exit {
        transform: translateX(0);
      }
      .slide-exit-active {
        transform: translateX(100%);
        transition: transform 0.3s ease-in;
      }
    </style>

        },
        {

          cat: "verdad",
          icon: "message-circle",
        },
        {
          text: "¿Quién de este grupo crees que tiene peor gusto vistiendo?",
          cat: "verdad",
          icon: "shirt",
        },
        {
          text: "¿Alguna vez te has liado con un compañero/a de trabajo?",
          cat: "verdad",
          icon: "briefcase",
        },
        { text: "Confiesa un secreto que nadie de aquí sepa.", cat: "verdad", icon: "lock" },
        {
          text: "¿Cuál ha sido tu peor cita? Cuéntalo con detalles.",
          cat: "verdad",
          icon: "calendar",
        },
        { text: "¿A qué edad perdiste la virginidad?", cat: "verdad", icon: "key" },
        {
          text: "Si tuvieras que eliminar a uno del grupo de tu vida, ¿quién sería?",
          cat: "verdad",
          icon: "user-minus",
        },
        {
          text: "¿Qué harías si fueras invisible por un día? La respuesta más aburrida bebe.",
          cat: "verdad",
          icon: "eye-off",
        },
        {
          text: "Dile a la persona de tu derecha qué superpoder le pega más y por qué.",
          cat: "verdad",

          cat: "verdad",

          cat: "verdad",

        },

          cat: "verdad",
          icon: "message-circle",
        },
      ];

      // --- STATE & UI ---
      const ui = {
        welcome: document.getElementById("welcome-screen"),
        cardContainer: document.getElementById("game-card"),
        cardText: document.getElementById("card-text"),
        cardIcon: document.getElementById("card-icon"),
        cardBadge: document.getElementById("card-cat-badge"),
        menuOverlay: document.getElementById("menu-overlay"),
        sideMenu: document.getElementById("side-menu"),
        btn: document.getElementById("spin-btn"),
      };

      let isAnimating = false;

      // Initialize Icons
      lucide.createIcons();

      // --- FUNCTIONS ---

      function toggleMenu() {
        const isClosed = ui.sideMenu.classList.contains("translate-x-full");

        if (isClosed) {
          ui.menuOverlay.classList.remove("hidden");
          setTimeout(() => {
            ui.sideMenu.classList.remove("translate-x-full");
          }, 10);
        } else {
          ui.sideMenu.classList.add("translate-x-full");
          setTimeout(() => {
            ui.menuOverlay.classList.add("hidden");
          }, 300);
        }
      }

      function getActiveCategories() {
        const cats = ["reto"]; // Always active base
        if (document.getElementById("mode-picante").checked) cats.push("picante");
        if (document.getElementById("mode-musica").checked) cats.push("musica");
        if (document.getElementById("mode-grupal").checked) cats.push("grupal");
        if (document.getElementById("mode-tragos").checked) cats.push("tragos");
        if (document.getElementById("mode-verdad").checked) cats.push("verdad");
        return cats;
      }

      function nextRound() {
        if (isAnimating) return;
        isAnimating = true;
        ui.btn.disabled = true;
        ui.btn.innerText = "BARAJANDO...";

        // Hide welcome if visible
        if (!ui.welcome.classList.contains("hidden")) {
          ui.welcome.classList.add("hidden");
          ui.cardContainer.classList.remove("hidden");
        }

        // Haptic
        if (navigator.vibrate) navigator.vibrate(20);

        // Animation Loop (Shuffle effect)
        let steps = 0;
        const maxSteps = 10;
        const interval = setInterval(() => {
          const randomCard = database[Math.floor(Math.random() * database.length)];
          updateCardVisuals(randomCard, true); // true = preview mode
          steps++;

          if (steps >= maxSteps) {
            clearInterval(interval);
            showFinalCard();
          }
        }, 80);
      }

      function showFinalCard() {
        const activeCats = getActiveCategories();
        // Filter database
        const filteredPool = database.filter((c) => activeCats.includes(c.cat));
        // Fallback if filter is too restrictive or empty
        const finalPool = filteredPool.length > 0 ? filteredPool : database;

        const card = finalPool[Math.floor(Math.random() * finalPool.length)];

        updateCardVisuals(card, false);

        // Final Haptic
        if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

        // Animation bounce
        const cardEl = document.querySelector(".brutal-card");
        cardEl.classList.add("animate__animated", "animate__headShake");

        setTimeout(() => {
          cardEl.classList.remove("animate__animated", "animate__headShake");
          isAnimating = false;
          ui.btn.disabled = false;
          ui.btn.innerHTML = `<span>SIGUIENTE</span> <i data-lucide="arrow-right-circle" class="w-8 h-8 ml-3"></i>`;
          lucide.createIcons();
        }, 500);
      }

      function updateCardVisuals(card, isPreview) {
        ui.cardText.innerText = card.text;
        ui.cardBadge.innerText = card.cat;
        ui.cardIcon.innerHTML = `<i data-lucide="${card.icon}" class="w-10 h-10 text-black"></i>`;

        const cardEl = document.querySelector(".brutal-card");

        ui.cardText.style.opacity = isPreview ? 0.5 : 1;

        let bg = "#ffffff";
        if (!isPreview) {
          switch (card.cat) {
            case "picante":
              bg = "#ffcccc";
              break; // Light Red
            case "musica":
              bg = "#e0ccff";
              break; // Light Purple
            case "grupal":
              bg = "#ccffcc";
              break; // Light Green
            case "tragos":
              bg = "#ffe0cc";
              break; // Light Orange
            case "verdad":
              bg = "#cceeff";
              break; // Light Blue
            default:
              bg = "#fafa24"; // Default Yellow
          }
        } else {
          bg = "#f0f0f0";
        }
        cardEl.style.backgroundColor = bg;

        lucide.createIcons();
      }
    </script>
